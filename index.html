<style>
  :root {
    --black:  #0f0e0c;
    --white:  #ffffff;
    --red:    #e03b2a;
    --yellow: #f5c842;
    --blue:   #2d5be3;
    --orange: #f07030;
    --pink:   #e8607a;
    --muted:  #7a7060;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--white);
    color: var(--black);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: none;
  }

  /* ── CURSOR ── */
  #cursor {
    position: fixed; z-index: 9999; pointer-events: none;
    top: 0; left: 0; transform: translate(-50%,-50%);
    width: 14px; height: 14px;
    background: var(--red); border-radius: 50%;
    transition: width .22s, height .22s, background .22s, border-radius .22s;
    mix-blend-mode: multiply;
  }
  #cursor.big  { width: 65px; height: 65px; background: var(--yellow); }
  #cursor.link { width: 38px; height: 38px; background: var(--blue); border-radius: 4px; }

  /* ── BLOBS — exact same keyframes as site ── */
  .blob-layer {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .blob {
    position: absolute; border-radius: 50%;
    animation: blobDrift ease-in-out infinite;
  }
  @keyframes blobDrift {
    0%,100% { transform: translate(0,0) scale(1); }
    25%      { transform: translate(18px,-24px) scale(1.06); }
    50%      { transform: translate(-12px,18px) scale(0.94); }
    75%      { transform: translate(22px,12px) scale(1.03); }
  }

  /* ── CENTER CONTENT ── */
  .stage {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: flex-start;
    padding: 0 3rem;
    animation: fadeUp .9s .1s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(36px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* eyebrow */
  .eyebrow {
    font-size: 0.72rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 0.9rem;
  }

  /* big Bebas title */
  .big-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5.5rem, 14vw, 11rem);
    line-height: 0.88;
    color: var(--black);
    margin-bottom: 2rem;
  }
  .big-title .dot { color: var(--red); }

  /* sub italic */
  .sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--muted);
    margin-bottom: 3rem;
    line-height: 1.6;
  }

  /* ── BARE LINE INPUT ── */
  .field-wrap {
    position: relative;
    width: clamp(260px, 36vw, 480px);
    margin-bottom: 2.2rem;
  }

  input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid rgba(15,14,12,0.2);
    padding: 10px 36px 10px 0;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.35rem;
    font-weight: 300;
    color: var(--black);
    outline: none;
    letter-spacing: 0.06em;
    transition: border-color 0.3s;
    caret-color: var(--red);
  }
  input::placeholder { color: rgba(122,112,96,0.45); }
  input:focus { border-bottom-color: var(--black); }

  .eye-btn {
    position: absolute; right: 0; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: none;
    color: rgba(122,112,96,0.5); padding: 4px;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--black); }

  /* ── ENTER BUTTON — site style ── */
  .btn {
    display: inline-block;
    padding: 0.9rem 2.6rem;
    background: var(--black); color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.76rem; font-weight: 400;
    letter-spacing: 0.16em; text-transform: uppercase;
    border: none; cursor: none;
    transition: background .28s, transform .18s;
  }
  .btn:hover { background: #3a8c5c; transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  /* ── SHAKE ── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
  .shake { animation: shake 0.38s ease; }
</style>
</head>
<body>

<div id="cursor"></div>

<!-- blobs: exact colors + sizes from site hero -->
<div class="blob-layer">
  <div class="blob" style="width:520px;height:520px;background:var(--yellow);opacity:.13;top:-120px;right:-130px;animation-duration:19s;"></div>
  <div class="blob" style="width:380px;height:380px;background:var(--red);opacity:.10;top:35%;left:-120px;animation-duration:15s;animation-delay:-5s;"></div>
  <div class="blob" style="width:300px;height:300px;background:var(--blue);opacity:.08;bottom:20%;right:5%;animation-duration:22s;animation-delay:-9s;"></div>
  <div class="blob" style="width:240px;height:240px;background:var(--pink);opacity:.10;top:65%;left:35%;animation-duration:17s;animation-delay:-3s;"></div>
  <div class="blob" style="width:160px;height:160px;background:var(--orange);opacity:.11;top:20%;left:45%;animation-duration:11s;animation-delay:-2s;"></div>
</div>

<div class="stage" id="stage">
  <p class="eyebrow">milandshik.com</p>

  <h1 class="big-title">
    Enter<span class="dot">.</span>
  </h1>

  <p class="sub">Private access — enter the password<br/>to continue.</p>

  <div class="field-wrap">
    <input type="password" id="pw" placeholder="password…" autocomplete="current-password"/>
    <button class="eye-btn" id="eyeBtn" type="button" aria-label="show password">
      <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <button class="btn" id="enterBtn">Enter</button>
</div>

<script>
  // ── cursor
  const cur = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
  const big  = () => { cur.classList.add('big');  cur.classList.remove('link'); };
  const lnk  = () => { cur.classList.add('link'); cur.classList.remove('big');  };
  const off  = () => cur.classList.remove('big','link');

  document.querySelectorAll('button').forEach(el => {
    el.addEventListener('mouseenter', lnk);
    el.addEventListener('mouseleave', off);
  });
  document.getElementById('stage').addEventListener('mouseenter', big);
  document.getElementById('stage').addEventListener('mouseleave', off);

  // ── eye toggle
  const pw      = document.getElementById('pw');
  const eyeBtn  = document.getElementById('eyeBtn');
  const eyeIcon = document.getElementById('eyeIcon');
  const openSVG   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const closedSVG = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  let shown = false;
  eyeBtn.addEventListener('click', () => {
    shown = !shown;
    pw.type = shown ? 'text' : 'password';
    eyeIcon.innerHTML = shown ? closedSVG : openSVG;
  });

  // ── submit with password check
  document.getElementById('enterBtn').addEventListener('click', () => {
    const s = document.getElementById('stage');
    if (pw.value === 'tententen') {
      window.location.href = 'gallery.html';
    } else {
      s.classList.remove('shake');
      void s.offsetWidth;
      s.classList.add('shake');
      pw.value = '';
    }
  });

  pw.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('enterBtn').click();
  });
</script>
</body>
</html>
